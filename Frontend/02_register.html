<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — AI Interview Simulator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:            #F4FAF8;
    --bg-elevated:   #FFFFFF;
    --surface:       #EAF5F1;
    --surface-2:     #DCEEE7;
    --border:        rgba(15,42,36,0.09);
    --border-strong: rgba(15,42,36,0.16);

    --text:          #122A24;
    --text-muted:    #52746B;
    --text-faint:    #86A69C;

    --mint:          #1FAE85;
    --mint-deep:     #0E8A66;
    --mint-dim:      rgba(31,174,133,0.13);
    --sky:           #3D8BE0;
    --sky-deep:      #2569B4;
    --sky-dim:       rgba(61,139,224,0.13);
    --coral:         #E0654C;
    --coral-dim:     rgba(224,101,76,0.12);

    --display: 'Fraunces', Georgia, serif;
    --body:    'Inter', -apple-system, sans-serif;
    --mono:    'JetBrains Mono', 'Courier New', monospace;
}

*{ margin:0; padding:0; box-sizing:border-box; }

body{
    font-family: var(--body);
    min-height: 100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    -webkit-font-smoothing:antialiased;
}
body::before{
    content:"";
    position:fixed; inset:0; z-index:-1;
    background:
        radial-gradient(ellipse 900px 500px at 15% -5%, rgba(31,174,133,0.14), transparent 60%),
        radial-gradient(ellipse 700px 500px at 100% 100%, rgba(61,139,224,0.14), transparent 60%),
        var(--bg);
}
::selection{ background:var(--mint); color:#fff; }
a:focus-visible, button:focus-visible, input:focus-visible{ outline:2px solid var(--sky-deep); outline-offset:2px; }

/* REGISTER CARD */
.register{
  width: 420px;
  max-width: 100%;
  padding: 38px 36px;
  border-radius: 22px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-strong);
  box-shadow: 0 24px 60px rgba(15,42,36,0.14);
  transition: box-shadow .3s ease;
}
.register:hover{ box-shadow: 0 28px 70px rgba(15,42,36,0.18); }

.logo{
  width:56px; height:56px; border-radius:16px;
  display:flex; align-items:center; justify-content:center;
  margin:0 auto 18px;
  background: linear-gradient(135deg, var(--mint-dim), var(--sky-dim));
  border: 1px solid rgba(31,174,133,0.28);
  font-size: 26px;
}

.title{
  text-align:center;
  font-family: var(--display);
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
}

.subtitle{
  text-align:center;
  color: var(--text-muted);
  font-size: 14px;
  margin-top: 8px;
  margin-bottom: 30px;
}

.input{ margin-bottom: 18px; }

.input label{
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text-muted);
  font-family: var(--mono);
  text-transform: uppercase;
  letter-spacing: .05em;
}

.input input{
  width:100%;
  padding: 13px 14px;
  margin-top: 8px;
  border-radius: 12px;
  border: 1px solid var(--border-strong);
  background: var(--surface);
  color: var(--text);
  font-family: var(--body);
  font-size: 14.5px;
  transition: border-color .2s ease, background .2s ease;
}
.input input::placeholder{ color: var(--text-faint); }
.input input:focus{
  outline:none;
  border-color: var(--sky-deep);
  background: var(--bg-elevated);
}

#passMsg{
  margin-top: 9px;
  font-size: 12.5px;
  font-family: var(--mono);
  line-height: 1.7;
  color: var(--text-muted);
}

.register-btn{
  width:100%;
  padding: 14px;
  border:none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  font-family: var(--body);
  background: linear-gradient(135deg, var(--mint-deep), var(--sky-deep));
  color:#fff;
  cursor:pointer;
  margin-top: 8px;
  box-shadow: 0 10px 26px rgba(14,138,102,0.28);
  transition: transform .2s ease, box-shadow .2s ease;
}
.register-btn:hover{ transform:translateY(-2px); box-shadow: 0 14px 32px rgba(14,138,102,0.36); }
.register-btn:active{ transform:translateY(0); }

.footer{
  text-align:center;
  margin-top: 22px;
  font-size: 13.5px;
  color: var(--text-muted);
}

a{ color: var(--sky-deep); text-decoration:none; font-weight:600; }
a:hover{ text-decoration: underline; }
</style>
</head>

<body>

<div class="register">

  <div class="logo">🎙️</div>

  <div class="title">Create Account</div>
  <div class="subtitle">Start practicing smarter, not harder.</div>

  <div class="input">
    <label>Full Name</label>
    <input id="name" placeholder="Enter full name">
  </div>

  <div class="input">
    <label>Email</label>
    <input id="email" placeholder="Enter email">
  </div>

  <div class="input">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" onkeyup="checkPassword()">
    <div id="passMsg">Password is required</div>
  </div>

  <button class="register-btn" onclick="register()">Register</button>

  <div class="footer">
    Already have an account? <a href="01_login.html">Log in</a>
  </div>

</div>

<script>

// PASSWORD CHECK
function checkPassword(){

let password =
document.getElementById("password").value;

let msg =
document.getElementById("passMsg");

let upper =
/[A-Z]/.test(password);

let lower =
/[a-z]/.test(password);

let number =
/[0-9]/.test(password);

let special =
/[@$!%*?&]/.test(password);

let length =
password.length >= 8;


if(password===""){

msg.style.color="var(--text-muted)";

msg.innerHTML=
"Password is required";

return;

}


if(
upper &&
lower &&
number &&
special &&
length
){

msg.style.color="var(--mint-deep)";

msg.innerHTML=
"Strong Password ✔";

}

else{

msg.style.color="var(--coral)";

msg.innerHTML=

(upper ? "✔ Uppercase<br>" : "❌ Uppercase<br>") +

(lower ? "✔ Lowercase<br>" : "❌ Lowercase<br>") +

(number ? "✔ Number<br>" : "❌ Number<br>") +

(special ? "✔ Special Character<br>" : "❌ Special Character<br>") +

(length
? "✔ Minimum 8 Characters"
: "❌ Minimum 8 Characters");

}

}



// REGISTER → BACKEND → DATABASE
async function register(){

let name =
document
.getElementById("name")
.value
.trim();

let email =
document
.getElementById("email")
.value
.trim();

let password =
document
.getElementById("password")
.value
.trim();



if(
name==="" ||
email==="" ||
password===""
){

alert(
"Fill all fields"
);

return;

}



// PASSWORD VALIDATION
let pattern =
/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;


if(
!pattern.test(password)
){

alert(
"Password requirements not satisfied"
);

return;

}



try{

let response =
await fetch(
"https://ai-interview-simulator-316l.onrender.com/register",
{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify({

name:name,
email:email,
password:password

})

}

);



let data =
await response.json();



if(response.ok){

alert(
data.message ||
"Registration Successful"
);


// CLEAR FIELDS
document.getElementById("name").value="";
document.getElementById("email").value="";
document.getElementById("password").value="";


// MOVE TO LOGIN
window.location.href =
"01_login.html";

}

else{

alert(
data.message ||
"Registration Failed"
);

}

}

catch(error){

console.log(error);

alert(
"Backend not running on port 8000"
);

}

}



// ENTER KEY SUPPORT
document.addEventListener(
"keydown",
function(event){

if(event.key==="Enter"){

register();

}

}
);

</script>

</body>
</html>
