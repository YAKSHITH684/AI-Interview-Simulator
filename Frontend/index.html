<script>
    javascript
async function uploadResume(){

let file =

document
.getElementById(
"fileInput"
)
.files[0];


if(!file){

alert(
"Upload Resume First"
);

return;

}


let formData =

new FormData();

formData.append(
"resume",
file
);


try{

let response =

await fetch(

"http://127.0.0.1:8000/analyze-resume",

{

method:"POST",

body:formData

}

);


let data =

await response.json();


document
.getElementById(
"atsScore"
)
.innerHTML =

data.ats_score + "%";


document
.getElementById(
"resumeScore"
)
.innerHTML =

data.resume_score + "%";


document
.getElementById(
"readinessScore"
)
.innerHTML =

data.readiness + "%";


document
.getElementById(
"skillsCount"
)
.innerHTML =

data.skills;


alert(
"Resume Analyzed"
);

}

catch(error){

console.log(error);

alert(
"Backend not running"
);

}

}






function menu(){

function logout(){

localStorage.clear();

sessionStorage.clear();

</script>
