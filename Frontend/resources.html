<!DOCTYPE html>

<title>Resources</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:

url("https://res.cloudinary.com/dfzdsdoa5/image/upload/v1782986305/download_pemxkn.webp");

background-size:cover;

background-position:center;

background-repeat:no-repeat;

background-attachment:fixed;

color:white;

min-height:100vh;

padding:40px;

}


.container{

margin:auto;

padding:30px;

}

border-radius:15px;

margin-bottom:20px;

}

.card h3{

margin-bottom:12px;

}

.btn{

display:inline-block;

padding:12px 20px;

border-radius:10px;

background:
linear-gradient(
90deg,
#38bdf8,
#0ea5e9
);

color:black;

text-decoration:none;

font-weight:bold;

}

.btn:hover{

transform:scale(1.03);

}

.back{

width:100%;

padding:12px;

cursor:pointer;

background:
