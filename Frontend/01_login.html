<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>AI Interview Simulator</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  background: url("https://res.cloudinary.com/dfzdsdoa5/image/upload/v1781495940/Data-unification-platform-Clouds-On-Mars-Success-Story-Hero-Graphic_jnmzkr.webp")
  no-repeat center center/cover;

  overflow:hidden;
}

/* LOGIN BOX */
.login{
  width: 650px;
  padding: 25px 40px;
  border-radius: 20px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  border: 1px solid rgba(255,255,255,0.2);

  color: white;
  position: relative;

  box-shadow: 0 0 20px rgba(53, 92, 255, 0.4);
  animation: glow 3s infinite alternate;

  transition: 0.3s;
}

.login:hover{
  transform: scale(1.02);
  box-shadow: 0 0 35px rgba(53,92,255,0.9),
              0 0 60px rgba(38,201,111,0.6);
}

/* LOGO */
.logo img{
  width: 80px;
  height: 80px;
  object-fit: contain;
  display: block;
  margin: 0 auto;
}

/* TITLE */
.title{
  text-align:center;
  margin-top:10px;
  font-size:34px;
  font-weight:bold;
  color:white;
}

/* SUBTITLE */
.subtitle{
  text-align:center;
  color:#e0f7fa;
  font-size:18px;
  margin-top:10px;
  margin-bottom:30px;
  text-shadow: 0 0 8px rgba(0,255,255,0.3);
}

/* INPUT */
.input{
  margin-bottom:20px;
}

.input label{
  font-size:14px;
}

.input input{
  width:100%;
  padding:16px;
  margin-top:8px;
  border-radius:14px;
  border:1px solid #ddd;
}

.input input:focus{
  outline:none;
  border-color:#355cff;
}

/* OPTIONS */
.options{
  display:flex;
  justify-content:space-between;
  margin-bottom:25px;
}

/* BUTTON */
.login-btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  font-size:18px;

  background: linear-gradient(90deg,#355cff,#26c96f);
  color:white;
  cursor:pointer;
}

.login-btn:hover{
  transform:scale(1.02);
}

/* GOOGLE BUTTON */
.google{
  width:100%;
  padding:16px;
  margin-top:15px;
  background:white;
  border:1px solid #ddd;
  border-radius:14px;
  cursor:pointer;
}

/* FOOTER */
.footer{
  text-align:center;
  margin-top:20px;
}

/* LINKS */
a{
  color:white;
  text-decoration:none;
}

/* ERROR */
#error{
  margin-top:10px;
  color:red;
  text-align:center;
  font-size:15px;
}

/* GLOW ANIMATION */
@keyframes glow {
  0% {
    box-shadow: 0 0 10px rgba(53,92,255,0.4),
                0 0 20px rgba(38,201,111,0.2);
  }
  100% {
    box-shadow: 0 0 25px rgba(53,92,255,0.8),
                0 0 40px rgba(38,201,111,0.5);
  }
}

</style>
</head>

<body>

<div class="login">

  <div class="logo">
    <img src="https://res.cloudinary.com/dfzdsdoa5/image/upload/v1781496318/7185ea6e6f375aa1ab00f1561d874177_kggruw.png">
  </div>

  <div class="title">AI Interview Simulator</div>

  <div class="subtitle">AI-Powered Practice. Real Interview Success</div>

  <div class="input">
    <label>Email</label>
    <input id="email" placeholder="Enter email">
  </div>

  <div class="input">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password">
  </div>

  <div class="options">
    <label><input type="checkbox"> Remember</label>
    <a href="03_forgot_password.html">Forgot Password?</a>
  </div>

  <button class="login-btn" onclick="login()">LOGIN</button>

  

  <div id="error"></div>

  <div class="footer">
    No account? <a href="02_register.html">Create Account</a>
  </div>

</div>

<script>

async function login(){

let email =
document
.getElementById("email")
.value
.trim();

let password =
document
.getElementById("password")
.value
.trim();

let error =
document
.getElementById("error");


error.innerHTML="";


if(
email===""
||
password===""
){

error.innerHTML=
"Fill all fields";

return;

}


try{

let response =

await fetch(

"https://ai-interview-simulator-316l.onrender.com/login",

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:

JSON.stringify({

email:email,

password:password

})

}

);


let data =

await response.json();



if(
data.success
){

localStorage.setItem(
"loggedIn",
"true"
);

alert(
"Login Successful"
);

window.location.href=
"index.html";

}

else{

error.innerHTML=
"Invalid Email or Password";

}

}

catch{

error.innerHTML=

"Backend not running";

}

}



// ENTER KEY LOGIN
document
.addEventListener(
"keypress",
function(e){

if(
e.key==="Enter"
){

login();

}

}
);

</script>

</body>
</html>
