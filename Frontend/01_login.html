<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — AI Interview Simulator</title>

<!-- ═══════════════════════════════════════
     BACKEND WARM-UP — fires the instant this
     page starts loading (this is the very first
     page most users hit). By the time they've
     typed their email/password and clicked Log In,
     Render's container is already awake, so the
     /login request itself is fast.
═══════════════════════════════════════ -->
<script>
(function warmBackend() {
  fetch("https://ai-interview-simulator-316l.onrender.com/ping").catch(function () {});
})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:            #F4FAF8;
    --bg-elevated:   #FFFFFF;
    --surface:       #EAF5F1;
    --surface-2:     #DCEEE7;
    --border:        rgba(15,42,36,0.09);
    --border-strong: rgba(15,42,36,0.16);

    --text:          #122A24;
    --text-muted:    #52746B;
    --text-faint:    #86A69C;

    --mint:          #1FAE85;
    --mint-deep:     #0E8A66;
    --mint-dim:      rgba(31,174,133,0.13);
    --sky:           #3D8BE0;
    --sky-deep:      #2569B4;
    --sky-dim:       rgba(61,139,224,0.13);
    --coral:         #E0654C;
    --coral-dim:     rgba(224,101,76,0.12);

    --display: 'Fraunces', Georgia, serif;
    --body:    'Inter', -apple-system, sans-serif;
    --mono:    'JetBrains Mono', 'Courier New', monospace;
}

*{ margin:0; padding:0; box-sizing:border-box; }

body{
    font-family: var(--body);
    min-height: 100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    -webkit-font-smoothing:antialiased;
}
body::before{
    content:"";
    position:fixed; inset:0; z-index:-1;
    background:
        radial-gradient(ellipse 900px 500px at 15% -5%, rgba(31,174,133,0.14), transparent 60%),
        radial-gradient(ellipse 700px 500px at 100% 100%, rgba(61,139,224,0.14), transparent 60%),
        var(--bg);
}
::selection{ background:var(--mint); color:#fff; }
a:focus-visible, button:focus-visible, input:focus-visible{ outline:2px solid var(--sky-deep); outline-offset:2px; }

/* LOGIN CARD */
.login{
  width: 420px;
  max-width: 100%;
  padding: 38px 36px;
  border-radius: 22px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-strong);
  box-shadow: 0 24px 60px rgba(15,42,36,0.14);
  transition: box-shadow .3s ease;
}
.login:hover{ box-shadow: 0 28px 70px rgba(15,42,36,0.18); }

.logo{
  width:56px; height:56px; border-radius:16px;
  display:flex; align-items:center; justify-content:center;
  margin:0 auto 18px;
  background: linear-gradient(135deg, var(--mint-dim), var(--sky-dim));
  border: 1px solid rgba(31,174,133,0.28);
  font-size: 26px;
}

.title{
  text-align:center;
  font-family: var(--display);
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
}

.subtitle{
  text-align:center;
  color: var(--text-muted);
  font-size: 14px;
  margin-top: 8px;
  margin-bottom: 30px;
}

.input{ margin-bottom: 18px; }

.input label{
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text-muted);
  font-family: var(--mono);
  text-transform: uppercase;
  letter-spacing: .05em;
}

.input input{
  width:100%;
  padding: 13px 14px;
  margin-top: 8px;
  border-radius: 12px;
  border: 1px solid var(--border-strong);
  background: var(--surface);
  color: var(--text);
  font-family: var(--body);
  font-size: 14.5px;
  transition: border-color .2s ease, background .2s ease;
}
.input input::placeholder{ color: var(--text-faint); }
.input input:focus{
  outline:none;
  border-color: var(--sky-deep);
  background: var(--bg-elevated);
}

.password-wrap{
  position:relative;
  margin-top:8px; /* moved here from .input input so the wrapper's box exactly matches the input's box, keeping the button truly centered */
}
.password-wrap input{ margin-top:0; padding-right: 44px; }
.toggle-password{
  position:absolute;
  right:6px;
  top:50%;
  transform:translateY(-50%);
  width:32px; height:32px;
  border:none;
  background:transparent;
  color: var(--text-faint);
  cursor:pointer;
  border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  transition: color .2s ease, background .2s ease;
}
.toggle-password:hover{ color: var(--text-muted); background: var(--surface-2); }
.toggle-password svg{ width:18px; height:18px; }

.options{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom: 26px;
  font-size: 13px;
  color: var(--text-muted);
}
.options label{ display:flex; align-items:center; gap:7px; cursor:pointer; }
.options input[type=checkbox]{ accent-color: var(--mint-deep); width:15px; height:15px; cursor:pointer; }
.options a{ color: var(--sky-deep); font-weight:600; }
.options a:hover{ text-decoration: underline; }

.login-btn{
  width:100%;
  padding: 14px;
  border:none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  font-family: var(--body);
  background: linear-gradient(135deg, var(--mint-deep), var(--sky-deep));
  color:#fff;
  cursor:pointer;
  box-shadow: 0 10px 26px rgba(14,138,102,0.28);
  transition: transform .2s ease, box-shadow .2s ease, opacity .2s ease;
  display:flex; align-items:center; justify-content:center; gap:9px;
}
.login-btn:hover{ transform:translateY(-2px); box-shadow: 0 14px 32px rgba(14,138,102,0.36); }
.login-btn:active{ transform:translateY(0); }
.login-btn:disabled{
  opacity: .75;
  cursor: not-allowed;
  transform: none;
}

/* small spinner shown inside the button while a login request is in flight */
.spinner{
  width:15px; height:15px;
  border:2px solid rgba(255,255,255,0.4);
  border-top-color:#fff;
  border-radius:50%;
  display:none;
  animation: spin .7s linear infinite;
}
.login-btn.loading .spinner{ display:inline-block; }
.login-btn.loading .btn-text{ opacity:.85; }
@keyframes spin{ to{ transform: rotate(360deg); } }

.footer{
  text-align:center;
  margin-top: 22px;
  font-size: 13.5px;
  color: var(--text-muted);
}

a{ color: var(--sky-deep); text-decoration:none; font-weight:600; }
a:hover{ text-decoration: underline; }

#error{
  margin-top: 14px;
  min-height: 18px;
  color: var(--coral);
  text-align:center;
  font-size: 13.5px;
  font-weight:500;
}
</style>
</head>

<body>

<div class="login">

  <div class="logo">🎙️</div>

  <div class="title">AI Interview Simulator</div>
  <div class="subtitle">AI-powered practice. Real interview success.</div>

  <div class="input">
    <label>Email</label>
    <input id="email" placeholder="Enter email">
  </div>

  <div class="input">
    <label>Password</label>
    <div class="password-wrap">
      <input type="password" id="password" placeholder="Enter password">
      <button type="button" class="toggle-password" id="togglePassword" onclick="togglePasswordVisibility()" aria-label="Show password">
        <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        <svg id="eyeOffIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 11 8 11 8a13.16 13.16 0 0 1-3.05 3.94M6.61 6.61A13.526 13.526 0 0 0 1 12s4 8 11 8a9.74 9.74 0 0 0 5.39-1.61"></path><line x1="2" y1="2" x2="22" y2="22"></line></svg>
      </button>
    </div>
  </div>

  <div class="options">
    <label><input type="checkbox"> Remember me</label>
    <a href="03_forgot_password.html">Forgot password?</a>
  </div>

  <button class="login-btn" id="loginBtn" onclick="login()">
    <span class="spinner"></span>
    <span class="btn-text">Log In</span>
  </button>

  <div id="error"></div>

  <div class="footer">
    No account? <a href="02_register.html">Create account</a>
  </div>

</div>

<script>

function togglePasswordVisibility(){
  let pwd = document.getElementById("password");
  let eyeIcon = document.getElementById("eyeIcon");
  let eyeOffIcon = document.getElementById("eyeOffIcon");
  let btn = document.getElementById("togglePassword");

  let showing = pwd.type === "password";
  pwd.type = showing ? "text" : "password";
  eyeIcon.style.display = showing ? "none" : "block";
  eyeOffIcon.style.display = showing ? "block" : "none";
  btn.setAttribute("aria-label", showing ? "Hide password" : "Show password");
}

async function login(){

let email =
document
.getElementById("email")
.value
.trim();

let password =
document
.getElementById("password")
.value
.trim();

let error =
document
.getElementById("error");

let btn = document.getElementById("loginBtn");
let btnText = btn.querySelector(".btn-text");


error.innerHTML="";


if(
email===""
||
password===""
){

error.innerHTML=
"Fill all fields";

return;

}

// Immediate visual feedback the instant the click happens —
// button locks and shows a spinner so it never feels unresponsive,
// even while the network request is still in flight.
btn.disabled = true;
btn.classList.add("loading");
btnText.textContent = "Logging in...";


try{

let response =

await fetch(

"https://ai-interview-simulator-316l.onrender.com/login",

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:

JSON.stringify({

email:email,

password:password

})

}

);


let data =

await response.json();



if(
data.success
){

localStorage.setItem(
"loggedIn",
"true"
);

window.location.href=
"index.html";

return; // navigating away — no need to reset button state

}

else{

error.innerHTML=
"Invalid Email or Password";

}

}

catch{

error.innerHTML=

"Backend not running";

}

finally{

// Only reached on failure/invalid-login paths (success already
// navigated away above), so it's safe to always reset here.
btn.disabled = false;
btn.classList.remove("loading");
btnText.textContent = "Log In";

}

}



// ENTER KEY LOGIN
document
.addEventListener(
"keypress",
function(e){

if(
e.key==="Enter"
){

login();

}

}
);

</script>

</body>
</html>
