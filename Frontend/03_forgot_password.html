<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Forgot Password</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
url("https://res.cloudinary.com/dfzdsdoa5/image/upload/v1781497837/1398314_cnccjh.webp")

}



/* FORGOT PASSWORD BOX */

.login{

border-radius:20px;

rgba(255,255,255,0.08);

-webkit-backdrop-filter:
blur(12px);

border:
1px solid rgba(255,255,255,0.2);

color:white;

box-shadow:

glow 3s infinite alternate;

}


.login:hover{

}



/* LOGO */

.logo img{

}

.input label{

}

.input input{

}

.login-btn{

</style>

</head>

<div class="login">

<div class="logo">

<img src="https://res.cloudinary.com/dfzdsdoa5/image/upload/v1781757218/forgot-password_nlugcz.png">

</div>


<div class="title">

Forgot Password

</div>


<div class="subtitle">

Reset your password securely

</div>



<div class="input">

<label>Email</label>

<input
id="email"
placeholder="Enter email">

</div>



<div class="input">

<label>New Password</label>

<input
type="password"
id="password"
placeholder="Enter new password">

</div>



<button
class="login-btn"
onclick="resetPassword()">

UPDATE PASSWORD

</button>


<div id="error"></div>


<div class="footer">

<a href="01_login.html">

Back To Login

</a>

</div>

</div>



<script>

async function resetPassword(){

let email =
document.getElementById("email").value;

let password =
document.getElementById("password").value;

let error =
document.getElementById("error");

error.innerHTML="";


try{

let response=

await fetch(

"https://ai-interview-simulator-316l.onrender.com/forgot-password",

{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify({

email:email,

new_password:password

})

}

);


let data=
await response.json();


if(data.success){

alert(
data.message
);

window.location.href=
"01_login.html";

}

else{

error.innerHTML=
data.message;

}

}

catch{

error.innerHTML=
"Backend not running";

}

}

</script>

</body>
