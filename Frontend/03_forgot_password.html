<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — AI Interview Simulator</title>

<!-- ═══════════════════════════════════════
     BACKEND WARM-UP — fires the instant this
     page starts loading, so Render's backend
     container is already awake by the time the
     user fills the form and clicks Update Password.
═══════════════════════════════════════ -->
<script>
(function warmBackend() {
  fetch("https://ai-interview-simulator-316l.onrender.com/ping").catch(function () {});
})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:            #F4FAF8;
    --bg-elevated:   #FFFFFF;
    --surface:       #EAF5F1;
    --surface-2:     #DCEEE7;
    --border:        rgba(15,42,36,0.09);
    --border-strong: rgba(15,42,36,0.16);

    --text:          #122A24;
    --text-muted:    #52746B;
    --text-faint:    #86A69C;

    --mint:          #1FAE85;
    --mint-deep:     #0E8A66;
    --mint-dim:      rgba(31,174,133,0.13);
    --sky:           #3D8BE0;
    --sky-deep:      #2569B4;
    --sky-dim:       rgba(61,139,224,0.13);
    --coral:         #E0654C;
    --coral-dim:     rgba(224,101,76,0.12);

    --display: 'Fraunces', Georgia, serif;
    --body:    'Inter', -apple-system, sans-serif;
    --mono:    'JetBrains Mono', 'Courier New', monospace;
}

*{ margin:0; padding:0; box-sizing:border-box; }

body{
    font-family: var(--body);
    min-height: 100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    -webkit-font-smoothing:antialiased;
}
body::before{
    content:"";
    position:fixed; inset:0; z-index:-1;
    background:
        radial-gradient(ellipse 900px 500px at 15% -5%, rgba(31,174,133,0.14), transparent 60%),
        radial-gradient(ellipse 700px 500px at 100% 100%, rgba(61,139,224,0.14), transparent 60%),
        var(--bg);
}
::selection{ background:var(--mint); color:#fff; }
a:focus-visible, button:focus-visible, input:focus-visible{ outline:2px solid var(--sky-deep); outline-offset:2px; }

/* FORGOT PASSWORD CARD */
.reset{
  width: 420px;
  max-width: 100%;
  padding: 38px 36px;
  border-radius: 22px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-strong);
  box-shadow: 0 24px 60px rgba(15,42,36,0.14);
  transition: box-shadow .3s ease;
}
.reset:hover{ box-shadow: 0 28px 70px rgba(15,42,36,0.18); }

.logo{
  width:56px; height:56px; border-radius:16px;
  display:flex; align-items:center; justify-content:center;
  margin:0 auto 18px;
  background: linear-gradient(135deg, var(--mint-dim), var(--sky-dim));
  border: 1px solid rgba(31,174,133,0.28);
  font-size: 26px;
}

.title{
  text-align:center;
  font-family: var(--display);
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
}

.subtitle{
  text-align:center;
  color: var(--text-muted);
  font-size: 14px;
  margin-top: 8px;
  margin-bottom: 30px;
}

.input{ margin-bottom: 18px; }

.input label{
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text-muted);
  font-family: var(--mono);
  text-transform: uppercase;
  letter-spacing: .05em;
}

.input input{
  width:100%;
  padding: 13px 14px;
  margin-top: 8px;
  border-radius: 12px;
  border: 1px solid var(--border-strong);
  background: var(--surface);
  color: var(--text);
  font-family: var(--body);
  font-size: 14.5px;
  transition: border-color .2s ease, background .2s ease;
}
.input input::placeholder{ color: var(--text-faint); }
.input input:focus{
  outline:none;
  border-color: var(--sky-deep);
  background: var(--bg-elevated);
}

.reset-btn{
  width:100%;
  padding: 14px;
  border:none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  font-family: var(--body);
  letter-spacing: .02em;
  background: linear-gradient(135deg, var(--mint-deep), var(--sky-deep));
  color:#fff;
  cursor:pointer;
  margin-top: 8px;
  box-shadow: 0 10px 26px rgba(14,138,102,0.28);
  transition: transform .2s ease, box-shadow .2s ease, opacity .2s ease;
  display:flex; align-items:center; justify-content:center; gap:9px;
}
.reset-btn:hover{ transform:translateY(-2px); box-shadow: 0 14px 32px rgba(14,138,102,0.36); }
.reset-btn:active{ transform:translateY(0); }
.reset-btn:disabled{
  opacity: .75;
  cursor: not-allowed;
  transform: none;
}

/* small spinner shown inside the button while a reset request is in flight */
.spinner{
  width:15px; height:15px;
  border:2px solid rgba(255,255,255,0.4);
  border-top-color:#fff;
  border-radius:50%;
  display:none;
  animation: spin .7s linear infinite;
}
.reset-btn.loading .spinner{ display:inline-block; }
.reset-btn.loading .btn-text{ opacity:.85; }
@keyframes spin{ to{ transform: rotate(360deg); } }

.footer{
  text-align:center;
  margin-top: 22px;
  font-size: 13.5px;
  color: var(--text-muted);
}

a{ color: var(--sky-deep); text-decoration:none; font-weight:600; }
a:hover{ text-decoration: underline; }

#error{
  margin-top: 14px;
  min-height: 18px;
  color: var(--coral);
  text-align:center;
  font-size: 13.5px;
  font-weight:500;
}
</style>
</head>

<body>

<div class="reset">

  <div class="logo">🔑</div>

  <div class="title">Forgot Password</div>
  <div class="subtitle">Reset your password securely</div>

  <div class="input">
    <label>Email</label>
    <input id="email" placeholder="Enter email">
  </div>

  <div class="input">
    <label>New Password</label>
    <input type="password" id="password" placeholder="Enter new password">
  </div>

  <button class="reset-btn" id="resetBtn" onclick="resetPassword()">
    <span class="spinner"></span>
    <span class="btn-text">Update Password</span>
  </button>

  <div id="error"></div>

  <div class="footer">
    <a href="01_login.html">Back to login</a>
  </div>

</div>

<script>

async function resetPassword(){

let email =
document.getElementById("email").value;

let password =
document.getElementById("password").value;

let error =
document.getElementById("error");

error.innerHTML="";

let btn = document.getElementById("resetBtn");
let btnText = btn.querySelector(".btn-text");

// Immediate visual feedback the instant the click happens —
// button locks and shows a spinner so it never feels unresponsive,
// even while the network request (and any Render cold-start) is in flight.
btn.disabled = true;
btn.classList.add("loading");
btnText.textContent = "Updating...";


try{

let response=

await fetch(

"https://ai-interview-simulator-316l.onrender.com/forgot-password",

{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify({

email:email,

new_password:password

})

}

);


let data=
await response.json();


if(data.success){

alert(
data.message
);

window.location.href=
"01_login.html";

return; // navigating away — no need to reset button state

}

else{

error.innerHTML=
data.message;

}

}

catch{

error.innerHTML=
"Backend not running";

}

finally{

// Only reached on failure paths (success already navigated away above)
btn.disabled = false;
btn.classList.remove("loading");
btnText.textContent = "Update Password";

}

}

</script>

</body>
</html>
