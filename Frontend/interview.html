<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Interview Chat</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial;

    background: url("https://res.cloudinary.com/dfzdsdoa5/image/upload/v1781780195/surreal-scenery-ai-1920x1080-18778_avqi7u.jpg");

    background-size: cover;
    background-position: center;
    background-attachment: fixed;

    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    color: white;
}

/* MAIN CARD */
.container {
    width: 720px;
    height: 780px;

    background: rgba(255, 255, 255, 0.07);
    backdrop-filter: blur(30px);
    border-radius: 20px;

    border: 1px solid rgba(255,255,255,0.12);

    display: flex;
    flex-direction: column;
    overflow: hidden;

    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

/* HEADER */
.header {
    padding: 14px;
    background: rgba(15, 20, 50, 0.8);

    display: flex;
    justify-content: space-between;
    align-items: center;

    font-weight: bold;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

/* MODE SELECT */
select#modeSelect {
    background: rgba(255,255,255,0.1);
    color: white;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    outline: none;
    cursor: pointer;
}

select#modeSelect option {
    background: #0f1432;
    color: white;
}

/* BACK BUTTON */
.back-btn {
    padding: 8px 14px;
    border: none;
    border-radius: 10px;

    background: linear-gradient(135deg, #6366f1, #38bdf8);
    color: black;
    font-weight: bold;
    cursor: pointer;
}

/* PROGRESS BAR */
.progress {
    height: 6px;
    background: rgba(255,255,255,0.1);
}

.progress-bar {
    height: 6px;
    width: 0%;
    background: linear-gradient(90deg,#38bdf8,#6366f1);
    transition: 0.3s;
}

/* CHAT BOX */
.chat {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    scroll-behavior: smooth;
}

/* AI MESSAGE */
.ai {
    background: rgba(59,130,246,0.85);
    padding: 10px 14px;
    margin: 8px;
    border-radius: 12px;
    max-width: 75%;
    width: fit-content;
    white-space: pre-wrap;
}

/* USER MESSAGE */
.user {
    background: rgba(34,197,94,0.85);
    padding: 10px 14px;
    margin: 8px;
    border-radius: 12px;
    margin-left: auto;
    max-width: 75%;
    white-space: pre-wrap;
}

/* TYPING */
.typing {
    font-size: 12px;
    opacity: 0.7;
    margin-left: 10px;
}

/* INPUT */
.input-box {
    display: flex;
    padding: 12px;
    background: rgba(15, 20, 50, 0.85);
}

input {
    flex: 1;
    padding: 12px;
    border: none;
    outline: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    color: white;
}

button.send {
    margin-left: 10px;
    padding: 12px 16px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #6366f1, #38bdf8);
    font-weight: bold;
    cursor: pointer;
}

button.send:disabled,
button.new:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

button.new {
    margin-left: 10px;
    padding: 8px 14px;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.12);
    color: white;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">

        <div class="header-left">

            <img src="https://res.cloudinary.com/dfzdsdoa5/image/upload/v1781798675/ai_obxb2v.png"
                 width="26" height="26">

            <div>AI Interview Chat</div>

            <select id="modeSelect" onchange="changeMode()">
                <option value="technical">Technical</option>
                <option value="hr">HR / Behavioral</option>
                <option value="system">System Design</option>
                <option value="dsa">DSA</option>
            </select>

            <button class="new" onclick="startInterview()">New</button>

        </div>

        <button class="back-btn" onclick="goBack()">← Back</button>

    </div>

    <!-- PROGRESS -->
    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div id="typing" class="typing" style="display:none;">
        🤖 AI is thinking...
    </div>

    <!-- CHAT -->
    <div class="chat" id="chat"></div>

    <!-- INPUT -->
    <div class="input-box">
        <input id="input" placeholder="Type your answer..." />
        <button class="send" id="sendBtn" onclick="send()">Send</button>
    </div>

</div>

<script>

const BACKEND = "https://ai-interview-simulator-316l.onrender.com";
const TOTAL_QUESTIONS = 10;

// The backend tracks progress entirely through the `history` array it
// returns. We must store that array exactly as given and send it back
// unmodified on every request — never reset it to [] except when the
// user explicitly starts a new interview.
let history = [];
let mode = "technical";
let busy = false;

function goBack() {
    window.location.href = "index.html";
}

function changeMode() {
    mode = document.getElementById("modeSelect").value;
    startInterview();
}

function updateProgress() {
    const aiTurns = history.filter(h => h.role === "assistant").length;
    const percent = Math.min((aiTurns / TOTAL_QUESTIONS) * 100, 100);
    document.getElementById("progressBar").style.width = percent + "%";
}

function clearChat() {
    document.getElementById("chat").innerHTML = "";
    document.getElementById("progressBar").style.width = "0%";
}

function addAI(text) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "ai";
    div.textContent = "🤖 " + text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function addUser(text) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "user";
    div.textContent = "👤 " + text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function callChat(message) {
    const res = await fetch(`${BACKEND}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            message: message,
            history: history,
            mode: mode
        })
    });

    if (!res.ok) {
        throw new Error(`Backend returned ${res.status}`);
    }

    const data = await res.json();

    // Always trust the history the backend hands back — it is the
    // single source of truth for how many questions have been asked.
    history = data.history || history;

    return data.reply;
}

// Begin a brand-new interview session (resets history to [])
async function startInterview() {
    history = [];
    clearChat();

    busy = true;
    document.getElementById("sendBtn").disabled = true;
    document.getElementById("typing").style.display = "block";

    try {
        const reply = await callChat("");
        addAI(reply);
        updateProgress();
    } catch (err) {
        console.error(err);
        addAI("⚠️ Could not reach the interview server. Please make sure the backend is running.");
    } finally {
        document.getElementById("typing").style.display = "none";
        busy = false;
        document.getElementById("sendBtn").disabled = false;
    }
}

// SEND — fires every time the user submits an answer
async function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text || busy) return;

    addUser(text);
    input.value = "";

    busy = true;
    document.getElementById("sendBtn").disabled = true;
    document.getElementById("typing").style.display = "block";

    try {
        const reply = await callChat(text);
        addAI(reply);
        updateProgress();
    } catch (err) {
        console.error(err);
        addAI("⚠️ Could not reach the interview server. Please try again.");
    } finally {
        document.getElementById("typing").style.display = "none";
        busy = false;
        document.getElementById("sendBtn").disabled = false;
    }
}

// Enter key to send
document.getElementById("input").addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
        e.preventDefault();
        send();
    }
});

// START — fires once when the page loads
window.onload = startInterview;

</script>

</body>
</html>
