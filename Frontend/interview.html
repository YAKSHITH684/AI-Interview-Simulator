<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Voice Interview — AI Interview Simulator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:            #F4FAF8;
    --bg-elevated:   #FFFFFF;
    --surface:       #EAF5F1;
    --surface-2:     #DCEEE7;
    --border:        rgba(15,42,36,0.09);
    --border-strong: rgba(15,42,36,0.16);

    --text:          #122A24;
    --text-muted:    #52746B;
    --text-faint:    #86A69C;

    --mint:          #1FAE85;
    --mint-deep:     #0E8A66;
    --mint-dim:      rgba(31,174,133,0.13);
    --sky:           #3D8BE0;
    --sky-deep:      #2569B4;
    --sky-dim:       rgba(61,139,224,0.13);
    --coral:         #E0654C;

    --display: 'Fraunces', Georgia, serif;
    --body:    'Inter', -apple-system, sans-serif;
    --mono:    'JetBrains Mono', 'Courier New', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: var(--body);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: var(--text);
    background: var(--bg);
    padding: 20px;
}
body::before{
    content:"";
    position:fixed; inset:0; z-index:-1;
    background:
        radial-gradient(ellipse 900px 500px at 18% -5%, rgba(31,174,133,0.12), transparent 60%),
        radial-gradient(ellipse 700px 500px at 100% 20%, rgba(61,139,224,0.12), transparent 60%),
        var(--bg);
}
::selection{ background:var(--mint); color:#fff; }
a:focus-visible, button:focus-visible, textarea:focus-visible, select:focus-visible{ outline:2px solid var(--sky-deep); outline-offset:2px; }

.container {
    width: 720px;
    height: 780px;
    max-height: calc(100vh - 40px);
    background: var(--bg-elevated);
    border-radius: 22px;
    border: 1px solid var(--border-strong);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(15,42,36,0.14);
}
.header {
    padding: 13px 16px;
    background: var(--surface);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    gap: 10px;
    border-bottom: 1px solid var(--border);
}
.header-left { display:flex; align-items:center; gap:10px; flex-wrap:wrap; font-size:14px; }
.icon-badge{
    width:30px; height:30px; border-radius:9px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:var(--mint-dim); border:1px solid rgba(31,174,133,0.3);
    font-size:15px;
}
.header-left .title{ font-family:var(--display); font-weight:600; font-size:15px; }
.status-dot { width:8px; height:8px; background:var(--mint); border-radius:50%; animation:pulse 2s infinite; box-shadow:0 0 6px rgba(31,174,133,0.5); }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

.mode-select {
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    color: var(--text);
    font-size: 12px;
    font-family: var(--body);
    padding: 6px 9px;
    cursor: pointer;
    outline: none;
}
.mode-select option { background: #fff; color: var(--text); }

.header-actions{ display:flex; gap:8px; }

.icon-btn{
    padding: 6px 12px;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    background: var(--bg-elevated);
    color: var(--text-muted);
    font-weight: 600;
    cursor: pointer;
    font-size: 12px;
    transition: 0.2s;
}
.icon-btn:hover{ background:var(--surface-2); color:var(--text); }
.icon-btn.active{ background:var(--mint-dim); border-color:rgba(31,174,133,0.35); color:var(--mint-deep); }
.icon-btn:disabled{ opacity:0.4; cursor:not-allowed; }

.back-btn {
    padding: 8px 16px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--mint-deep), var(--sky-deep));
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    font-size: 13px;
    transition: 0.2s;
    box-shadow:0 6px 16px rgba(14,138,102,0.25);
}
.back-btn:hover{ transform:scale(1.05); }

.progress { height: 4px; background: var(--surface-2); flex-shrink:0; }
.progress-bar { height: 4px; width: 0%; background: linear-gradient(90deg, var(--mint), var(--sky)); transition: 0.5s; }

.chat {
    flex: 1;
    padding: 18px;
    overflow-y: auto;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    gap: 11px;
    scroll-behavior: smooth;
}
.chat::-webkit-scrollbar { width: 4px; }
.chat::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

.ai {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    padding: 12px 16px;
    border-radius: 14px 14px 14px 3px;
    max-width: 78%;
    width: fit-content;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    box-shadow: 0 3px 10px rgba(15,42,36,0.06);
}
.ai .msg-text{
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
}
.replay-btn{
    flex-shrink: 0;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-faint);
    padding: 3px 5px;
    border-radius: 6px;
    transition: 0.2s;
    line-height: 1;
}
.replay-btn:hover{ color:var(--mint-deep); background:var(--mint-dim); }
.replay-btn.speaking{ color:var(--sky-deep); background:var(--sky-dim); animation:pulse 1s infinite; }

.user {
    background: linear-gradient(135deg, var(--mint), var(--mint-deep));
    color: #fff;
    padding: 12px 16px;
    border-radius: 14px 14px 3px 14px;
    margin-left: auto;
    max-width: 78%;
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.6;
    box-shadow: 0 6px 16px rgba(14,138,102,0.22);
}

.typing-dots { display:flex; gap:5px; align-items:center; padding:12px 16px; background:var(--sky-dim); border:1px solid rgba(61,139,224,0.2); border-radius:14px 14px 14px 3px; width:fit-content; }
.typing-dots span {
    width:7px; height:7px;
    background: var(--sky-deep);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    opacity:.7;
}
.typing-dots span:nth-child(2) { animation-delay:0.2s; }
.typing-dots span:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0);} 30%{transform:translateY(-6px);} }

.listening-banner{
    display:none;
    align-items:center; gap:8px;
    padding:7px 16px;
    background: rgba(224,101,76,0.1);
    border-top: 1px solid rgba(224,101,76,0.25);
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--coral);
    flex-shrink:0;
}
.listening-banner.show{ display:flex; }
.listening-banner .rec-dot{ width:7px; height:7px; border-radius:50%; background:var(--coral); animation:pulse 1s infinite; }

.input-box {
    display: flex;
    padding: 14px;
    background: var(--surface);
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
}
textarea {
    flex: 1;
    padding: 12px 15px;
    border: 1px solid var(--border-strong);
    outline: none;
    border-radius: 12px;
    background: var(--bg-elevated);
    color: var(--text);
    font-family: var(--body);
    font-size: 14px;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
}
textarea:focus{ border-color:var(--sky-deep); }
textarea::placeholder { color: var(--text-faint); }

.mic-btn{
    width: 44px; height: 44px;
    border: 1px solid var(--border-strong);
    border-radius: 12px;
    background: var(--bg-elevated);
    color: var(--text-muted);
    font-size: 17px;
    cursor: pointer;
    flex-shrink: 0;
    transition: 0.2s;
    display:flex; align-items:center; justify-content:center;
}
.mic-btn:hover{ border-color:var(--mint); color:var(--mint-deep); }
.mic-btn.listening{
    background: linear-gradient(135deg, var(--coral), #c0392b);
    border-color: transparent;
    color: #fff;
    animation: micPulse 1.2s infinite;
}
@keyframes micPulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(224,101,76,0.45);} 50%{ box-shadow:0 0 0 9px rgba(224,101,76,0);} }
.mic-btn:disabled{ opacity:0.4; cursor:not-allowed; animation:none; }

.send-btn {
    width: 44px; height: 44px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--mint-deep), var(--sky-deep));
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
    transition: 0.2s;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 16px rgba(14,138,102,0.25);
}
.send-btn:hover { transform: scale(1.08); }
.send-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none; }

@media(max-width:740px){ .container{width:98vw;height:96vh;border-radius:14px;} }
</style>
</head>
<body>
<div class="container">

    <div class="header">
        <div class="header-left">
            <div class="icon-badge">🎙️</div>
            <span class="title">AI Voice Interview</span>
            <div class="status-dot"></div>
            <select class="mode-select" id="modeSelect" onchange="newSession()">
                <option value="technical">🛠️ Technical</option>
                <option value="hr">🤝 HR / Behavioral</option>
                <option value="system">🏗️ System Design</option>
                <option value="dsa">🧮 DSA</option>
            </select>
        </div>
        <div class="header-actions">
            <button class="icon-btn active" id="speakToggleBtn" onclick="toggleAutoSpeak()">🔊 Voice</button>
            <button class="icon-btn" onclick="newSession()">🔄 New</button>
            <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
        </div>
    </div>

    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>

    <div class="chat" id="chat"></div>

    <div class="listening-banner" id="listeningBanner"><span class="rec-dot"></span> Listening… speak your answer, then tap the mic to stop</div>

    <div class="input-box">
        <textarea id="input" placeholder="Type your answer, or tap 🎤 to speak it... (Enter to send, Shift+Enter for new line)" rows="1"></textarea>
        <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Speak your answer">🎤</button>
        <button class="send-btn" id="sendBtn" onclick="send()">➤</button>
    </div>

</div>

<script>
const BACKEND = "https://ai-interview-simulator-316l.onrender.com";
const TOTAL = 10;
let history = [];
let busy = false;

/* ---------------- Voice output (text-to-speech) ---------------- */
const synthSupported = 'speechSynthesis' in window;
let autoSpeak = true;

function speak(text, btn) {
    if (!synthSupported) return;
    window.speechSynthesis.cancel(); // interrupt anything currently speaking
    document.querySelectorAll('.replay-btn.speaking').forEach(b => b.classList.remove('speaking'));

    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 1;
    utter.pitch = 1;
    utter.lang = 'en-US';
    if (btn) {
        btn.classList.add('speaking');
        utter.onend = () => btn.classList.remove('speaking');
        utter.onerror = () => btn.classList.remove('speaking');
    }
    window.speechSynthesis.speak(utter);
}

function toggleAutoSpeak() {
    autoSpeak = !autoSpeak;
    const btn = document.getElementById("speakToggleBtn");
    btn.textContent = autoSpeak ? "🔊 Voice" : "🔇 Voice";
    btn.classList.toggle("active", autoSpeak);
    if (!autoSpeak && synthSupported) window.speechSynthesis.cancel();
}

if (!synthSupported) {
    const btn = document.getElementById("speakToggleBtn");
    btn.disabled = true;
    btn.title = "Voice output isn't supported in this browser.";
    btn.textContent = "🔇 Voice";
    btn.classList.remove("active");
    autoSpeak = false;
}

/* ---------------- Voice input (speech-to-text) ---------------- */
const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let recognizing = false;
let baseText = "";

if (SpeechRecognitionAPI) {
    recognition = new SpeechRecognitionAPI();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    recognition.onstart = () => {
        recognizing = true;
        const micBtn = document.getElementById("micBtn");
        micBtn.classList.add("listening");
        micBtn.textContent = "⏹️";
        document.getElementById("listeningBanner").classList.add("show");
        const input = document.getElementById("input");
        baseText = input.value ? input.value.trim() + " " : "";
    };

    recognition.onresult = (e) => {
        let interim = "", final = "";
        for (let i = e.resultIndex; i < e.results.length; i++) {
            const transcript = e.results[i][0].transcript;
            if (e.results[i].isFinal) final += transcript + " ";
            else interim += transcript;
        }
        if (final) baseText += final;
        const input = document.getElementById("input");
        input.value = (baseText + interim).trim();
        input.dispatchEvent(new Event('input'));
    };

    recognition.onerror = (e) => {
        console.error("Speech recognition error:", e.error);
        if (e.error === 'not-allowed' || e.error === 'permission-denied') {
            alert("Microphone access was blocked. Please allow microphone permissions to use voice input.");
        }
        stopListening();
    };

    recognition.onend = () => stopListening();
} else {
    const micBtn = document.getElementById("micBtn");
    micBtn.disabled = true;
    micBtn.title = "Voice input isn't supported in this browser — try Chrome or Edge.";
}

function stopListening() {
    recognizing = false;
    const micBtn = document.getElementById("micBtn");
    micBtn.classList.remove("listening");
    micBtn.textContent = "🎤";
    document.getElementById("listeningBanner").classList.remove("show");
}

function toggleMic() {
    if (!recognition || busy) return;
    if (recognizing) {
        recognition.stop();
    } else {
        if (synthSupported) window.speechSynthesis.cancel(); // don't talk over the user
        try { recognition.start(); } catch (e) { /* already running */ }
    }
}

/* ---------------- Chat ---------------- */
function addAI(text) {
    removeTyping();
    const div = document.createElement("div");
    div.className = "ai";

    const span = document.createElement("span");
    span.className = "msg-text";
    span.textContent = "🤖 " + text;
    div.appendChild(span);

    if (synthSupported) {
        const replayBtn = document.createElement("button");
        replayBtn.className = "replay-btn";
        replayBtn.title = "Play this question";
        replayBtn.textContent = "🔊";
        replayBtn.onclick = () => speak(text, replayBtn);
        div.appendChild(replayBtn);
    }

    document.getElementById("chat").appendChild(div);
    scrollBottom();
    updateProgress();

    if (autoSpeak) {
        const replayBtn = div.querySelector('.replay-btn');
        speak(text, replayBtn);
    }
}

function addUser(text) {
    const div = document.createElement("div");
    div.className = "user";
    div.textContent = "👤 " + text;
    document.getElementById("chat").appendChild(div);
    scrollBottom();
}

function showTyping() {
    removeTyping();
    const div = document.createElement("div");
    div.className = "typing-dots";
    div.id = "typingEl";
    div.innerHTML = "<span></span><span></span><span></span>";
    document.getElementById("chat").appendChild(div);
    scrollBottom();
}

function removeTyping() {
    document.getElementById("typingEl")?.remove();
}

function scrollBottom() {
    const c = document.getElementById("chat");
    c.scrollTop = c.scrollHeight;
}

function updateProgress() {
    const aiTurns = history.filter(h => h.role === "assistant").length;
    const pct = Math.min((aiTurns / TOTAL) * 100, 100);
    document.getElementById("progressBar").style.width = pct + "%";
}

function setBusy(state) {
    busy = state;
    document.getElementById("sendBtn").disabled = state;
    if (recognition) document.getElementById("micBtn").disabled = state;
}

async function callChat(message) {
    const mode = document.getElementById("modeSelect").value;
    const res = await fetch(`${BACKEND}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message, history, mode })
    });
    if (!res.ok) throw new Error("Backend error " + res.status);
    const data = await res.json();
    history = data.history || history;
    return data.reply;
}

async function newSession() {
    if (recognizing) recognition.stop();
    if (synthSupported) window.speechSynthesis.cancel();
    history = [];
    document.getElementById("chat").innerHTML = "";
    document.getElementById("progressBar").style.width = "0%";
    setBusy(true);
    showTyping();
    try {
        const reply = await callChat("");
        addAI(reply);
    } catch(e) {
        addAI("Could not connect to the server. Please try again.");
    } finally {
        setBusy(false);
    }
}

async function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text || busy) return;

    if (recognizing) recognition.stop();

    addUser(text);
    input.value = "";
    input.style.height = "auto";
    setBusy(true);
    showTyping();

    try {
        const reply = await callChat(text);
        addAI(reply);
    } catch(e) {
        addAI("Could not reach the server. Please try again.");
    } finally {
        setBusy(false);
    }
}

// Auto resize textarea
document.getElementById("input").addEventListener("input", function() {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 120) + "px";
});

// Enter to send
document.getElementById("input").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

// Start
window.onload = () => newSession();
</script>
</body>
</html>
