<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Interview Chat</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Segoe UI', Arial;
    background: url("https://res.cloudinary.com/dfzdsdoa5/image/upload/v1781780195/surreal-scenery-ai-1920x1080-18778_avqi7u.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}
.container {
    width: 720px; height: 780px;
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(30px);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.12);
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.header {
    padding: 13px 16px;
    background: rgba(15,20,50,0.85);
    display: flex; justify-content: space-between; align-items: center;
    font-weight: bold; flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}
.header-left { display:flex; align-items:center; gap:10px; font-size:14px; }
.status-dot { width:8px; height:8px; background:#22c55e; border-radius:50%; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
select#modeSelect {
    background: rgba(255,255,255,0.1); color: white;
    border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
    padding: 5px 8px; font-size: 12px; outline: none; cursor: pointer;
}
select#modeSelect option { background: #0f1432; color: white; }
.new-btn {
    padding: 6px 12px; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px; background: rgba(255,255,255,0.08);
    color: white; font-size: 12px; cursor: pointer; transition: 0.2s;
}
.new-btn:hover { background: rgba(255,255,255,0.18); }
.back-btn {
    padding: 7px 14px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, #6366f1, #38bdf8);
    color: black; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s;
}
.back-btn:hover { transform: scale(1.05); }
.progress { height: 5px; background: rgba(255,255,255,0.08); flex-shrink:0; }
.progress-bar { height:5px; width:0%; background:linear-gradient(90deg,#38bdf8,#6366f1); transition:0.4s; }
.chat {
    flex: 1; padding: 16px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth;
}
.chat::-webkit-scrollbar { width: 4px; }
.chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
.ai {
    background: linear-gradient(135deg, rgba(37,99,235,0.9), rgba(29,78,216,0.9));
    padding: 11px 15px; border-radius: 14px 14px 14px 3px;
    max-width: 78%; width: fit-content; white-space: pre-wrap;
    font-size: 14px; line-height: 1.6; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
.user {
    background: linear-gradient(135deg, rgba(34,197,94,0.9), rgba(22,163,74,0.9));
    padding: 11px 15px; border-radius: 14px 14px 3px 14px;
    margin-left: auto; max-width: 78%; white-space: pre-wrap;
    font-size: 14px; line-height: 1.6; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
.typing-dots {
    display: flex; gap: 5px; align-items: center;
    padding: 11px 15px; background: rgba(37,99,235,0.4);
    border-radius: 14px 14px 14px 3px; width: fit-content;
}
.typing-dots span {
    width:7px; height:7px; background:rgba(255,255,255,0.6);
    border-radius:50%; animation:bounce 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:0.2s;}
.typing-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}
.input-box {
    display: flex; padding: 12px;
    background: rgba(15,20,50,0.85); gap: 10px;
    align-items: flex-end; flex-shrink: 0;
    border-top: 1px solid rgba(255,255,255,0.08);
}
textarea {
    flex: 1; padding: 11px 14px; border: 1px solid rgba(255,255,255,0.1);
    outline: none; border-radius: 12px;
    background: rgba(255,255,255,0.09); color: white;
    font-family: 'Segoe UI', Arial; font-size: 14px;
    resize: none; min-height: 44px; max-height: 120px; line-height: 1.5;
    transition: border-color 0.2s;
}
textarea:focus { border-color: rgba(99,102,241,0.5); }
textarea::placeholder { color: rgba(255,255,255,0.38); }
.send-btn {
    width:44px; height:44px; border:none; border-radius:12px;
    background:linear-gradient(135deg,#6366f1,#38bdf8);
    color:white; font-size:16px; cursor:pointer; flex-shrink:0;
    transition:0.2s; display:flex; align-items:center; justify-content:center;
}
.send-btn:hover{transform:scale(1.08);}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
@media(max-width:740px){.container{width:98vw;height:98vh;border-radius:12px;}}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-left">
            <img src="https://res.cloudinary.com/dfzdsdoa5/image/upload/v1781798675/ai_obxb2v.png" width="26" height="26">
            <div>AI Interview Chat</div>
            <div class="status-dot"></div>
            <select id="modeSelect" onchange="changeMode()">
                <option value="technical">🛠️ Technical</option>
                <option value="hr">🤝 HR / Behavioral</option>
                <option value="system">🏗️ System Design</option>
                <option value="dsa">🧮 DSA</option>
            </select>
            <button class="new-btn" onclick="startInterview()">🔄 New</button>
        </div>
        <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
    </div>

    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div class="chat" id="chat"></div>

    <div class="input-box">
        <textarea id="input" placeholder="Type your answer... (Enter to send, Shift+Enter for new line)" rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()">➤</button>
    </div>
</div>

<script>
const BACKEND = "https://ai-interview-simulator-316l.onrender.com";
const TOTAL_QUESTIONS = 10;
let history = [], mode = "technical", busy = false;

function changeMode() { mode = document.getElementById("modeSelect").value; startInterview(); }

function updateProgress() {
    const pct = Math.min((history.filter(h=>h.role==="assistant").length / TOTAL_QUESTIONS) * 100, 100);
    document.getElementById("progressBar").style.width = pct + "%";
}

function addAI(text) {
    removeTyping();
    const d = document.createElement("div"); d.className="ai"; d.textContent="🤖 "+text;
    document.getElementById("chat").appendChild(d); scrollBottom(); updateProgress();
}
function addUser(text) {
    const d = document.createElement("div"); d.className="user"; d.textContent="👤 "+text;
    document.getElementById("chat").appendChild(d); scrollBottom();
}
function showTyping() {
    removeTyping();
    const d = document.createElement("div"); d.className="typing-dots"; d.id="typingEl";
    d.innerHTML="<span></span><span></span><span></span>";
    document.getElementById("chat").appendChild(d); scrollBottom();
}
function removeTyping() { document.getElementById("typingEl")?.remove(); }
function scrollBottom() { const c=document.getElementById("chat"); c.scrollTop=c.scrollHeight; }

async function callChat(message) {
    const res = await fetch(`${BACKEND}/chat`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({message, history, mode})
    });
    if (!res.ok) throw new Error("Error "+res.status);
    const data = await res.json();
    history = data.history || history;
    return data.reply;
}

async function startInterview() {
    history=[]; document.getElementById("chat").innerHTML=""; document.getElementById("progressBar").style.width="0%";
    busy=true; document.getElementById("sendBtn").disabled=true; showTyping();
    try { addAI(await callChat("")); }
    catch(e) { addAI("Could not connect to the server. Please try again."); }
    finally { busy=false; document.getElementById("sendBtn").disabled=false; }
}

async function send() {
    const input=document.getElementById("input"), text=input.value.trim();
    if (!text||busy) return;
    addUser(text); input.value=""; input.style.height="auto";
    busy=true; document.getElementById("sendBtn").disabled=true; showTyping();
    try { addAI(await callChat(text)); }
    catch(e) { addAI("Could not reach the server. Please try again."); }
    finally { busy=false; document.getElementById("sendBtn").disabled=false; }
}

document.getElementById("input").addEventListener("input", function() {
    this.style.height="auto"; this.style.height=Math.min(this.scrollHeight,120)+"px";
});
document.getElementById("input").addEventListener("keydown", function(e) {
    if (e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}
});
window.onload = startInterview;
</script>
</body>
</html>
