<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Analysis — AI Interview Simulator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:            #F4FAF8;
    --bg-elevated:   #FFFFFF;
    --surface:       #EAF5F1;
    --surface-2:     #DCEEE7;
    --border:        rgba(15,42,36,0.09);
    --border-strong: rgba(15,42,36,0.16);

    --text:          #122A24;
    --text-muted:    #52746B;
    --text-faint:    #86A69C;

    --mint:          #1FAE85;
    --mint-deep:     #0E8A66;
    --mint-dim:      rgba(31,174,133,0.13);
    --sky:           #3D8BE0;
    --sky-deep:      #2569B4;
    --sky-dim:       rgba(61,139,224,0.13);
    --coral:         #E0654C;
    --coral-dim:     rgba(224,101,76,0.13);
    --amber:         #D69A1F;
    --amber-dim:     rgba(214,154,31,0.13);

    --display: 'Fraunces', Georgia, serif;
    --body:    'Inter', -apple-system, sans-serif;
    --mono:    'JetBrains Mono', 'Courier New', monospace;
}

*{ box-sizing:border-box; margin:0; padding:0; }

body{
    font-family:var(--body);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
    -webkit-font-smoothing:antialiased;
    background:var(--bg);
}
body::before{
    content:"";
    position:fixed; inset:0; z-index:-1;
    background:
        radial-gradient(ellipse 900px 500px at 18% -5%, rgba(31,174,133,0.12), transparent 60%),
        radial-gradient(ellipse 700px 500px at 100% 20%, rgba(61,139,224,0.12), transparent 60%),
        var(--bg);
}

::selection{ background:var(--mint); color:#fff; }
a:focus-visible, button:focus-visible, input:focus-visible{ outline:2px solid var(--sky-deep); outline-offset:3px; }

.page{ width:100%; max-width:560px; }

.eyebrow{
    font-family:var(--mono);
    font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--mint-deep);
    display:inline-flex; align-items:center; gap:8px;
    margin-bottom:10px;
}
.eyebrow::before{ content:""; width:5px; height:5px; border-radius:50%; background:var(--mint); box-shadow:0 0 8px rgba(31,174,133,0.5); }

.container {
  background: var(--bg-elevated);
  border-radius: 22px;
  border: 1px solid var(--border-strong);
  padding: 34px;
  box-shadow: 0 24px 56px rgba(15,42,36,0.12);
}

h2 {
    font-family:var(--display); font-weight:600; font-size:24px;
    display:flex; align-items:center; gap:12px; margin-bottom:6px;
}
h2 .icon-badge{
    width:40px; height:40px; border-radius:11px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:var(--mint-dim); border:1px solid rgba(31,174,133,0.3);
    font-size:18px;
}
.subtext{ color:var(--text-muted); font-size:13.5px; margin-bottom:24px; }

.upload-area {
  border: 2px dashed var(--border-strong);
  border-radius: 14px;
  padding: 28px 20px;
  text-align: center;
  cursor: pointer;
  transition: .25s ease;
  margin-bottom: 14px;
  background: var(--surface);
}
.upload-area:hover { border-color: var(--sky-deep); background: var(--sky-dim); }
.upload-area input { display:none; }
.upload-area .emoji{ font-size:1.9rem; margin-bottom:6px; }
.upload-area p { color: var(--text-muted); font-size:13.5px; margin-top:5px; }
.upload-area p.hint{ color: var(--text-faint); font-size:12px; }

#fileName{
    text-align:center; font-family:var(--mono); font-size:12.5px;
    color:var(--mint-deep); margin-bottom:14px; min-height:18px;
}

button {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 12px;
  font-weight: 700;
  font-size: 14.5px;
  cursor: pointer;
  transition: .25s ease;
  margin-bottom: 10px;
  font-family:var(--body);
}
#analyzeBtn{
  background: linear-gradient(135deg, var(--mint-deep), var(--sky-deep));
  color: #fff;
  box-shadow: 0 10px 26px rgba(14,138,102,0.28);
}
#analyzeBtn:hover { transform: translateY(-2px); box-shadow:0 14px 32px rgba(14,138,102,0.36); }
#analyzeBtn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow:none; }

.back-btn {
  background: transparent;
  border: 1px solid var(--border-strong);
  color: var(--text-muted);
}
.back-btn:hover { background: var(--surface); color: var(--text); border-color:var(--border-strong); }

.result { display:none; margin-top:22px; }

.score-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.score-box {
  background: var(--surface);
  border-radius: 14px;
  padding: 16px 10px;
  text-align: center;
  border: 1px solid var(--border);
}
.score-box .val { font-family:var(--display); font-size: 26px; font-weight: 700; color: var(--sky-deep); }
.score-box .lbl { font-family:var(--mono); font-size: 10.5px; color: var(--text-faint); margin-top: 4px; text-transform:uppercase; letter-spacing:.05em; }

.section {
  background: var(--surface);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
}
.section-title {
    font-family:var(--mono); font-size: 11px; font-weight: 600; color: var(--mint-deep);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px;
}

.badge {
  display: inline-block;
  padding: 5px 12px;
  margin: 3px;
  border-radius: 999px;
  background: var(--sky-dim);
  color: var(--sky-deep);
  font-size: 12px;
  font-weight:500;
  border: 1px solid rgba(61,139,224,0.28);
}

.verdict {
  padding: 11px 14px;
  border-radius: 11px;
  font-weight: 700;
  font-size: 14px;
  text-align: center;
  margin-bottom: 14px;
}
.verdict.strong   { background: var(--mint-dim);  color: var(--mint-deep);  border: 1px solid rgba(31,174,133,0.3); }
.verdict.moderate { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(214,154,31,0.3); }
.verdict.weak      { background: var(--coral-dim); color: var(--coral); border: 1px solid rgba(224,101,76,0.3); }

.suggestion-item {
  display: flex; gap: 9px; align-items: flex-start;
  font-size: 13px; margin-bottom: 8px; color: var(--text);
  line-height:1.5;
}
.suggestion-item span.icon { color: var(--sky-deep); flex-shrink: 0; font-weight:700; }

.bar-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.bar-row:last-child{ margin-bottom:0; }
.bar-lbl { width: 112px; font-size: 12px; color: var(--text-muted); flex-shrink:0; }
.bar-track { flex:1; height:8px; background:var(--surface-2); border-radius:999px; overflow:hidden; }
.bar-fill { height:100%; border-radius:999px; background:linear-gradient(90deg, var(--mint), var(--sky)); transition:width 1s ease; }
.bar-val { width:36px; text-align:right; font-family:var(--mono); font-size:12px; font-weight:600; color:var(--sky-deep); }

.spinner {
    width:28px; height:28px; border:3px solid var(--border-strong);
    border-top-color: var(--mint-deep); border-radius:50%;
    animation:spin 0.8s linear infinite; margin:0 auto;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading { text-align:center; padding:26px 10px; }
.loading p { margin-top:12px; color:var(--text-muted); font-size:13px; font-family:var(--mono); }

.summary-text{ font-size:13px; line-height:1.65; color:var(--text-muted); }

.action-row{ display:flex; gap:10px; margin-top:6px; }
.action-link{
    flex:1; text-align:center; padding:12px; border-radius:11px;
    font-size:13px; font-weight:700; text-decoration:none;
    transition:.2s ease;
}
.action-link.primary{ background:var(--mint-dim); color:var(--mint-deep); border:1px solid rgba(31,174,133,0.3); }
.action-link.primary:hover{ background:rgba(31,174,133,0.22); }
.action-link.secondary{ background:var(--sky-dim); color:var(--sky-deep); border:1px solid rgba(61,139,224,0.3); }
.action-link.secondary:hover{ background:rgba(61,139,224,0.22); }

.error-msg{ text-align:center; padding:22px; color:var(--coral); font-size:13.5px; font-weight:500; }

@media (max-width:600px){
    .container{ padding:24px; }
    .score-row{ gap:8px; }
}
</style>
</head>
<body>
<div class="page">

  <div class="container">
    <h2>
      <span class="icon-badge">📄</span>
      Resume Analysis
    </h2>
    <p class="subtext">Upload your resume and get an ATS score, extracted skills, and specific edits — in under a minute.</p>

    <div class="upload-area" id="dropZone" onclick="document.getElementById('resumeFile').click()">
      <div class="emoji">📤</div>
      <p>Click to upload your resume</p>
      <p class="hint">Supports PDF, DOCX, TXT</p>
      <input type="file" id="resumeFile" accept=".pdf,.docx,.txt" onchange="handleFile(this)">
    </div>

    <div id="fileName"></div>

    <button id="analyzeBtn" onclick="uploadResume()">⚡ Analyze with AI</button>

    <div class="result" id="result">
      <div id="resultContent"></div>
    </div>

    <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
  </div>

</div>

<script>
const BACKEND = "https://ai-interview-simulator-316l.onrender.com";

function handleFile(input) {
  const file = input.files[0];
  if (file) document.getElementById('fileName').textContent = '📎 ' + file.name;
}

async function uploadResume() {
  const file = document.getElementById("resumeFile").files[0];
  if (!file) { alert("Please select a resume file first"); return; }

  const btn = document.getElementById("analyzeBtn");
  const result = document.getElementById("result");
  const content = document.getElementById("resultContent");

  btn.disabled = true;
  btn.textContent = "Analyzing...";
  result.style.display = "block";
  content.innerHTML = `<div class="loading"><div class="spinner"></div><p>AI is analyzing your resume...</p></div>`;

  try {
    const formData = new FormData();
    formData.append("resume", file);

    const res = await fetch(`${BACKEND}/analyze-resume`, { method: "POST", body: formData });
    const data = await res.json();

    // Verdict class
    const verdictClass = data.ai_verdict?.toLowerCase().includes("strong") ? "strong"
                       : data.ai_verdict?.toLowerCase().includes("moderate") ? "moderate" : "weak";

    // Skill breakdown bars
    const breakdown = data.skill_breakdown || {};
    const barsHTML = Object.entries(breakdown).map(([k,v]) => `
      <div class="bar-row">
        <span class="bar-lbl">${k}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${v}%"></div></div>
        <span class="bar-val">${v}%</span>
      </div>`).join('');

    // Suggestions
    const suggestions = data.suggestions || [];
    const sugHTML = suggestions.map(s => `
      <div class="suggestion-item"><span class="icon">→</span><span>${s}</span></div>`).join('');

    content.innerHTML = `
      <div class="score-row">
        <div class="score-box"><div class="val" style="color:var(--sky-deep)">${data.ats_score}%</div><div class="lbl">ATS Score</div></div>
        <div class="score-box"><div class="val" style="color:var(--mint-deep)">${data.resume_score}%</div><div class="lbl">Resume Score</div></div>
        <div class="score-box"><div class="val" style="color:var(--coral)">${data.readiness}%</div><div class="lbl">Readiness</div></div>
      </div>

      <div class="verdict ${verdictClass}">${data.ai_verdict}</div>

      ${data.summary ? `<div class="section"><div class="section-title">Summary</div><p class="summary-text">${data.summary}</p></div>` : ''}

      <div class="section">
        <div class="section-title">Skills Detected (${data.skills})</div>
        ${(data.ai_skills_found || []).map(s => `<span class="badge">${s}</span>`).join('') || '<p style="font-size:13px;color:var(--text-faint);">No skills detected</p>'}
      </div>

      ${barsHTML ? `<div class="section"><div class="section-title">Skill Breakdown</div>${barsHTML}</div>` : ''}

      ${sugHTML ? `<div class="section"><div class="section-title">Suggestions</div>${sugHTML}</div>` : ''}

      <div class="action-row">
        <a href="ai_analysis.html" class="action-link primary">📊 Full AI Analysis</a>
        <a href="interview.html" class="action-link secondary">🎙️ Start Interview</a>
      </div>
    `;
  } catch (e) {
    content.innerHTML = `<div class="error-msg">Error analyzing resume. Please try again.</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "⚡ Analyze with AI";
  }
}
</script>
</body>
</html>
