<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Resume Analyzer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial;
  background: url("https://res.cloudinary.com/dfzdsdoa5/image/upload/v1781497982/how-integration-enables-ai_jcjmn2.jpg");
  background-size: cover;
  background-position: center;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  padding: 20px;
}
.container {
  width: 520px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.15);
  padding: 30px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
h2 { display:flex; align-items:center; gap:10px; margin-bottom:20px; font-size:20px; }
.upload-area {
  border: 2px dashed rgba(255,255,255,0.3);
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
  margin-bottom: 15px;
}
.upload-area:hover { border-color: #38bdf8; background: rgba(56,189,248,0.08); }
.upload-area input { display:none; }
.upload-area p { color: rgba(255,255,255,0.6); font-size:14px; margin-top:6px; }
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #38bdf8, #6366f1);
  color: white;
  font-weight: bold;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
  margin-bottom: 10px;
}
button:hover { transform: scale(1.02); }
button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.back-btn {
  background: transparent;
  border: 1px solid #38bdf8;
  color: #38bdf8;
}
.back-btn:hover { background: #38bdf8; color: black; }
.result { display:none; margin-top:20px; }
.score-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 15px;
}
.score-box {
  background: rgba(0,0,0,0.3);
  border-radius: 12px;
  padding: 14px 10px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.1);
}
.score-box .val { font-size: 28px; font-weight: 800; color: #38bdf8; }
.score-box .lbl { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }
.section {
  background: rgba(0,0,0,0.3);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
  border: 1px solid rgba(255,255,255,0.08);
}
.section-title { font-size: 12px; font-weight: 700; color: #38bdf8; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.badge {
  display: inline-block;
  padding: 4px 10px;
  margin: 3px;
  border-radius: 999px;
  background: rgba(56,189,248,0.2);
  color: #38bdf8;
  font-size: 12px;
  border: 1px solid rgba(56,189,248,0.3);
}
.verdict {
  padding: 10px 14px;
  border-radius: 10px;
  font-weight: 600;
  font-size: 14px;
  text-align: center;
  margin-bottom: 12px;
}
.verdict.strong { background: rgba(34,197,94,0.2); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
.verdict.moderate { background: rgba(251,191,36,0.2); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
.verdict.weak { background: rgba(239,68,68,0.2); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
.suggestion-item {
  display: flex; gap: 8px; align-items: flex-start;
  font-size: 13px; margin-bottom: 6px; color: rgba(255,255,255,0.85);
}
.suggestion-item span.icon { color: #38bdf8; flex-shrink: 0; }
.bar-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.bar-lbl { width: 110px; font-size: 12px; color: rgba(255,255,255,0.7); flex-shrink:0; }
.bar-track { flex:1; height:8px; background:rgba(255,255,255,0.1); border-radius:999px; overflow:hidden; }
.bar-fill { height:100%; border-radius:999px; background:linear-gradient(90deg,#38bdf8,#6366f1); transition:width 1s ease; }
.bar-val { width:35px; text-align:right; font-size:12px; font-weight:700; color:#38bdf8; }
.spinner { width:28px; height:28px; border:3px solid rgba(255,255,255,0.2); border-top-color:#38bdf8; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading { text-align:center; padding:20px; }
.loading p { margin-top:10px; color:rgba(255,255,255,0.6); font-size:13px; }
</style>
</head>
<body>
<div class="container">
  <h2>
    <img src="https://res.cloudinary.com/dfzdsdoa5/image/upload/v1781799349/resume_cm4xcz.png" width="36">
    Resume Analysis
  </h2>

  <div class="upload-area" id="dropZone" onclick="document.getElementById('resumeFile').click()">
    <div style="font-size:2rem;">📄</div>
    <p>Click to upload your resume</p>
    <p>Supports PDF, DOCX, TXT</p>
    <input type="file" id="resumeFile" accept=".pdf,.docx,.txt" onchange="handleFile(this)">
  </div>

  <div id="fileName" style="text-align:center;font-size:13px;color:#38bdf8;margin-bottom:10px;min-height:18px;"></div>

  <button id="analyzeBtn" onclick="uploadResume()">⚡ Analyze with AI</button>

  <div class="result" id="result">
    <div id="resultContent"></div>
  </div>

  <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
</div>

<script>
const BACKEND = "https://ai-interview-simulator-316l.onrender.com";

function handleFile(input) {
  const file = input.files[0];
  if (file) document.getElementById('fileName').textContent = '📎 ' + file.name;
}

async function uploadResume() {
  const file = document.getElementById("resumeFile").files[0];
  if (!file) { alert("Please select a resume file first"); return; }

  const btn = document.getElementById("analyzeBtn");
  const result = document.getElementById("result");
  const content = document.getElementById("resultContent");

  btn.disabled = true;
  btn.textContent = "Analyzing...";
  result.style.display = "block";
  content.innerHTML = `<div class="loading"><div class="spinner"></div><p>AI is analyzing your resume...</p></div>`;

  try {
    const formData = new FormData();
    formData.append("resume", file);

    const res = await fetch(`${BACKEND}/analyze-resume`, { method: "POST", body: formData });
    const data = await res.json();

    // Verdict class
    const verdictClass = data.ai_verdict?.toLowerCase().includes("strong") ? "strong"
                       : data.ai_verdict?.toLowerCase().includes("moderate") ? "moderate" : "weak";

    // Skill breakdown bars
    const breakdown = data.skill_breakdown || {};
    const barsHTML = Object.entries(breakdown).map(([k,v]) => `
      <div class="bar-row">
        <span class="bar-lbl">${k}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${v}%"></div></div>
        <span class="bar-val">${v}%</span>
      </div>`).join('');

    // Suggestions
    const suggestions = data.suggestions || [];
    const sugHTML = suggestions.map(s => `
      <div class="suggestion-item"><span class="icon">→</span><span>${s}</span></div>`).join('');

    content.innerHTML = `
      <div class="score-row">
        <div class="score-box"><div class="val">${data.ats_score}%</div><div class="lbl">ATS Score</div></div>
        <div class="score-box"><div class="val" style="color:#a78bfa">${data.resume_score}%</div><div class="lbl">Resume Score</div></div>
        <div class="score-box"><div class="val" style="color:#22c55e">${data.readiness}%</div><div class="lbl">Readiness</div></div>
      </div>

      <div class="verdict ${verdictClass}">${data.ai_verdict}</div>

      ${data.summary ? `<div class="section"><div class="section-title">Summary</div><p style="font-size:13px;line-height:1.6;color:rgba(255,255,255,0.8);">${data.summary}</p></div>` : ''}

      <div class="section">
        <div class="section-title">Skills Detected (${data.skills})</div>
        ${(data.ai_skills_found || []).map(s => `<span class="badge">${s}</span>`).join('') || '<p style="font-size:13px;color:rgba(255,255,255,0.5);">No skills detected</p>'}
      </div>

      ${barsHTML ? `<div class="section"><div class="section-title">Skill Breakdown</div>${barsHTML}</div>` : ''}

      ${sugHTML ? `<div class="section"><div class="section-title">Suggestions</div>${sugHTML}</div>` : ''}

      <div style="display:flex;gap:10px;margin-top:5px;">
        <a href="ai_analysis.html" style="flex:1;text-align:center;padding:10px;background:rgba(99,102,241,0.3);border-radius:10px;color:#a78bfa;font-size:13px;font-weight:600;text-decoration:none;border:1px solid rgba(99,102,241,0.3);">📊 Full AI Analysis</a>
        <a href="interview.html" style="flex:1;text-align:center;padding:10px;background:rgba(56,189,248,0.2);border-radius:10px;color:#38bdf8;font-size:13px;font-weight:600;text-decoration:none;border:1px solid rgba(56,189,248,0.3);">🎙️ Start Interview</a>
      </div>
    `;
  } catch (e) {
    content.innerHTML = `<div style="text-align:center;padding:20px;color:#ef4444;">Error analyzing resume. Please try again.</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "⚡ Analyze with AI";
  }
}
</script>
</body>
</html>
