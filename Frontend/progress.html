<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interview Progress</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial;
    background: linear-gradient(135deg, #0f172a, #1e1b4b);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* CARD */
.container {
    width: 500px;
    padding: 25px;

    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    border-radius: 16px;

    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

/* BACK BUTTON */
button {
    padding: 8px 14px;
    border: none;
    border-radius: 10px;
    cursor: pointer;

    background: linear-gradient(135deg, #6366f1, #38bdf8);
    font-weight: bold;
    color: black;
}

/* PROGRESS BAR */
.progress-bar-bg {
    width: 100%;
    height: 12px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    overflow: hidden;
    margin-top: 15px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #38bdf8, #6366f1);
    transition: 0.4s;
}

/* INFO BOX */
.info {
    margin-top: 20px;
    line-height: 1.8;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div>Interview Progress</div>
        <button onclick="goBack()">Back</button>
    </div>

    <div id="status">Status: In Progress</div>

    <div class="progress-bar-bg">
        <div class="progress-bar" id="bar"></div>
    </div>

    <div class="info">
        <p>Current Step: <span id="step">0</span> / 10</p>
        <p>Score: <span id="score">0</span></p>
        <p>Performance: <span id="performance">Not Started</span></p>
    </div>

</div>

<script>

let step = 0;
let score = 0;

function updateUI() {

    document.getElementById("step").innerText = step;

    let percent = (step / 10) * 100;
    document.getElementById("bar").style.width = percent + "%";

    document.getElementById("score").innerText = score;

    if (step == 0) {
        document.getElementById("performance").innerText = "Not Started";
    } 
    else if (step < 5) {
        document.getElementById("performance").innerText = "Needs Improvement";
    } 
    else if (step < 10) {
        document.getElementById("performance").innerText = "Good";
    } 
    else {
        document.getElementById("performance").innerText = "Excellent";
        document.getElementById("status").innerText = "Status: Completed";
    }
}

/* simulate progress */
function nextStep() {
    if (step < 10) {
        step++;
        score += 10;
        updateUI();
    }
}

function goBack() {
    window.location.href = "index.html";
}

updateUI();

</script>

</body>
</html>
