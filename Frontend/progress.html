
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Interview Progress</title>

<style>

body{
margin:0;

font-family:Arial;

background:
url("https://res.cloudinary.com/dfzdsdoa5/image/upload/v1781863161/5815532-3840x2160-desktop-hd-4k-wallpaper-image_vhguty.jpg");

background-size:cover;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

color:white;
}

.container{

width:550px;

padding:30px;

border-radius:20px;

background:
rgba(255,255,255,.08);

backdrop-filter:
blur(20px);

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

}

.title{

display:flex;

gap:10px;

font-size:24px;

font-weight:bold;

}

.title img{

width:42px;

}

button{

padding:10px 15px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

}

.upload{

background:
linear-gradient(
90deg,
#22c55e,
#16a34a
);

color:white;

}

.back{

background:
linear-gradient(
90deg,
#38bdf8,
#0ea5e9
);

}

.status{

margin-top:20px;

padding:15px;

background:
rgba(255,255,255,.05);

border-radius:12px;

}

.progress-bg{

margin-top:20px;

height:20px;

background:
rgba(255,255,255,.1);

border-radius:40px;

overflow:hidden;

}

.progress{

height:100%;

width:0;

background:
linear-gradient(
90deg,
#38bdf8,
#6366f1
);

transition:1s;

}

.score{

font-size:40px;

text-align:center;

margin-top:20px;

color:#38bdf8;

}

.info{

margin-top:20px;

line-height:2;

}

input{

display:none;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="title">

<img
src="https://res.cloudinary.com/dfzdsdoa5/image/upload/v1781763958/ai-image_a6hbir.png">

Interview Progress

</div>

<div>

<input
type="file"
id="resumeFile">

<button
class="upload"
onclick="pickResume()">

Upload Resume

</button>

<button
class="back"
onclick="goBack()">

← Back

</button>

</div>

</div>

<div
class="status"
id="status">

Click Upload Resume

</div>

<div class="progress-bg">

<div
class="progress"
id="bar">

</div>

</div>

<div
class="score"
id="score">

0%

</div>

<div class="info">

Resume Score:
<span id="resume">0</span>

<br>

Readiness:
<span id="ready">0</span>

<br>

Skills:
<span id="skills">0</span>

<br>

Performance:
<span id="performance">

Waiting

</span>

</div>

</div>

<script>

function goBack(){

window.location.href=
"index.html";

}

function pickResume(){

document
.getElementById(
"resumeFile"
)
.click();

}

document
.getElementById(
"resumeFile"
)

.addEventListener(

"change",

uploadResume

);

async function uploadResume(){

const file=

document
.getElementById(
"resumeFile"
)
.files[0];

if(!file)
return;

const formData=
new FormData();

formData.append(
"resume",
file
);

document
.getElementById(
"status"
)
.innerText=

"Analyzing...";

const res=

await fetch(

"https://ai-interview-simulator-316l.onrender.com/analyze-resume",

{

method:"POST",

body:formData

}

);

const data=
await res.json();

let ats=
data.ats_score||0;

document
.getElementById(
"bar"
)
.style.width=

ats+"%";

document
.getElementById(
"score"
)
.innerText=

ats+"%";

document
.getElementById(
"resume"
)
.innerText=

data.resume_score;

document
.getElementById(
"ready"
)
.innerText=

data.readiness;

document
.getElementById(
"skills"
)
.innerText=

data.skills;

let p=
"Needs Improvement";

if(ats>=60)
p="Good";

if(ats>=80)
p="Excellent";

document
.getElementById(
"performance"
)
.innerText=p;

document
.getElementById(
"status"
)
.innerText=

"Resume Uploaded Successfully";

}

</script>

</body>

</html>
