<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Analysis</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial;
  background: linear-gradient(rgba(15,23,42,0.88), rgba(15,23,42,0.88)),
    url("https://images.unsplash.com/photo-1550751827-4bd374c3f58b");
  background-size: cover;
  background-position: center;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  padding: 20px;
}
.container {
  width: 560px;
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.12);
  padding: 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
h2 { display:flex; align-items:center; gap:10px; margin-bottom:20px; font-size:20px; }
.upload-area {
  border: 2px dashed rgba(255,255,255,0.25);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
  margin-bottom: 12px;
}
.upload-area:hover { border-color: #38bdf8; }
.upload-area input { display:none; }
.upload-area p { color: rgba(255,255,255,0.5); font-size:13px; margin-top:5px; }
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #0ea5e9, #6366f1);
  color: white;
  font-weight: bold;
  font-size: 14px;
  cursor: pointer;
  transition: 0.3s;
  margin-bottom: 10px;
}
button:hover { transform: scale(1.02); }
button:disabled { opacity: 0.5; cursor:not-allowed; transform:none; }
.back-btn { background: transparent; border: 1px solid #38bdf8; color: #38bdf8; }
.back-btn:hover { background: #38bdf8; color: black; }
.result { display:none; margin-top:20px; }
.metrics { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.metric {
  background: rgba(0,0,0,0.3);
  border-radius: 12px;
  padding: 14px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.08);
}
.metric .val { font-size:32px; font-weight:800; }
.metric .lbl { font-size:11px; color:rgba(255,255,255,0.55); margin-top:3px; }
.section {
  background: rgba(0,0,0,0.3);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
  border: 1px solid rgba(255,255,255,0.08);
}
.section-title { font-size:11px; font-weight:700; color:#38bdf8; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:10px; }
.badge { display:inline-block; padding:4px 10px; margin:3px; border-radius:999px; background:rgba(56,189,248,0.15); color:#38bdf8; font-size:12px; border:1px solid rgba(56,189,248,0.25); }
.bar-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.bar-lbl { width:110px; font-size:12px; color:rgba(255,255,255,0.65); flex-shrink:0; }
.bar-track { flex:1; height:8px; background:rgba(255,255,255,0.1); border-radius:999px; overflow:hidden; }
.bar-fill { height:100%; border-radius:999px; background:linear-gradient(90deg,#38bdf8,#6366f1); transition:width 1s ease; }
.bar-val { width:32px; text-align:right; font-size:12px; font-weight:700; color:#38bdf8; }
.list-item { display:flex; gap:8px; align-items:flex-start; font-size:13px; margin-bottom:7px; color:rgba(255,255,255,0.85); }
.list-item .icon { flex-shrink:0; }
.spinner { width:28px; height:28px; border:3px solid rgba(255,255,255,0.15); border-top-color:#38bdf8; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading { text-align:center; padding:24px; }
.loading p { margin-top:10px; color:rgba(255,255,255,0.5); font-size:13px; }
</style>
</head>
<body>
<div class="container">
  <h2>
    <img src="https://res.cloudinary.com/dfzdsdoa5/image/upload/v1781763958/ai-image_a6hbir.png" width="44">
    AI Resume Analyzer
  </h2>

  <div class="upload-area" onclick="document.getElementById('resumeFile').click()">
    <div style="font-size:2rem;">📄</div>
    <p>Click to upload your resume for deep AI analysis</p>
    <p>PDF, DOCX, TXT supported</p>
    <input type="file" id="resumeFile" accept=".pdf,.docx,.txt" onchange="handleFile(this)">
  </div>

  <div id="fileName" style="text-align:center;font-size:13px;color:#38bdf8;margin-bottom:10px;min-height:18px;"></div>

  <button id="analyzeBtn" onclick="analyzeResume()">🤖 Run Full AI Analysis</button>

  <div class="result" id="result">
    <div id="resultContent"></div>
  </div>

  <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
</div>

<script>
const BACKEND = "https://ai-interview-simulator-316l.onrender.com";

function handleFile(input) {
  const file = input.files[0];
  if (file) document.getElementById('fileName').textContent = '📎 ' + file.name;
}

async function analyzeResume() {
  const file = document.getElementById("resumeFile").files[0];
  if (!file) { alert("Please select a resume file"); return; }

  const btn = document.getElementById("analyzeBtn");
  const result = document.getElementById("result");
  const content = document.getElementById("resultContent");

  btn.disabled = true;
  btn.textContent = "Analyzing...";
  result.style.display = "block";
  content.innerHTML = `<div class="loading"><div class="spinner"></div><p>Groq AI is performing deep analysis...</p></div>`;

  try {
    const formData = new FormData();
    formData.append("resume", file);
    const res = await fetch(`${BACKEND}/analyze-resume`, { method: "POST", body: formData });
    const data = await res.json();

    const breakdown = data.skill_breakdown || {};
    const barsHTML = Object.entries(breakdown).map(([k,v]) => `
      <div class="bar-row">
        <span class="bar-lbl">${k}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${v}%"></div></div>
        <span class="bar-val">${v}%</span>
      </div>`).join('');

    const strengths = data.strengths || [];
    const suggestions = data.suggestions || [];
    const skills = data.ai_skills_found || [];

    content.innerHTML = `
      <div class="metrics">
        <div class="metric"><div class="val" style="color:#38bdf8">${data.ats_score}%</div><div class="lbl">ATS Score</div></div>
        <div class="metric"><div class="val" style="color:#22c55e">${data.readiness}%</div><div class="lbl">Readiness</div></div>
      </div>

      ${data.summary ? `
      <div class="section">
        <div class="section-title">AI Summary</div>
        <p style="font-size:13px;line-height:1.7;color:rgba(255,255,255,0.8);">${data.summary}</p>
      </div>` : ''}

      <div class="section">
        <div class="section-title">Skills Found (${data.skills})</div>
        ${skills.map(s => `<span class="badge">${s}</span>`).join('') || '<p style="font-size:13px;color:rgba(255,255,255,0.4);">No skills detected</p>'}
      </div>

      ${barsHTML ? `<div class="section"><div class="section-title">Skill Breakdown</div>${barsHTML}</div>` : ''}

      ${strengths.length ? `
      <div class="section">
        <div class="section-title">Strengths</div>
        ${strengths.map(s => `<div class="list-item"><span class="icon" style="color:#22c55e">✓</span><span>${s}</span></div>`).join('')}
      </div>` : ''}

      ${suggestions.length ? `
      <div class="section">
        <div class="section-title">Suggestions to Improve</div>
        ${suggestions.map(s => `<div class="list-item"><span class="icon" style="color:#fbbf24">→</span><span>${s}</span></div>`).join('')}
      </div>` : ''}

      <div class="section">
        <div class="section-title">AI Verdict</div>
        <p style="font-size:14px;font-weight:600;color:#38bdf8;">${data.ai_verdict}</p>
        ${data.ai_feedback ? `<p style="font-size:13px;color:rgba(255,255,255,0.7);margin-top:6px;">${data.ai_feedback}</p>` : ''}
      </div>

      <a href="interview.html" style="display:block;text-align:center;padding:12px;background:linear-gradient(135deg,#38bdf8,#6366f1);border-radius:12px;color:white;font-weight:bold;text-decoration:none;margin-top:5px;">🎙️ Start Interview Now</a>
    `;
  } catch(e) {
    content.innerHTML = `<div style="text-align:center;padding:20px;color:#ef4444;">Error running analysis. Please try again.</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "🤖 Run Full AI Analysis";
  }
}
</script>
</body>
</html>
