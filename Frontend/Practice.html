<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Interview Practice</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Segoe UI', Arial;
    background: url("https://res.cloudinary.com/dfzdsdoa5/image/upload/v1781497837/1398314_cnccjh.webp");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}
.container {
    width: 720px;
    height: 780px;
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(30px);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.12);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.header {
    padding: 14px 16px;
    background:  rgba(8, 6, 7, 0.85);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    flex-shrink: 0;
    gap: 10px;
}
.header-left { display:flex; align-items:center; gap:10px; }
.mode-select {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: white;
    font-size: 13px;
    padding: 5px 8px;
    cursor: pointer;
    outline: none;
}
.mode-select option { background: #1e1e3f; }
.back-btn {
    padding: 7px 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #6366f1, #38bdf8);
    color: black;
    font-weight: bold;
    cursor: pointer;
    font-size: 13px;
}
.progress { height: 5px; background: rgba(255,255,255,0.08); flex-shrink:0; }
.progress-bar { height: 5px; width: 0%; background: linear-gradient(90deg,#38bdf8,#6366f1); transition: 0.5s; }
.typing {
    font-size: 12px;
    opacity: 0.6;
    padding: 6px 15px;
    display: none;
    flex-shrink: 0;
}
.chat {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
}
.chat::-webkit-scrollbar { width: 4px; }
.chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
.ai {
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    padding: 12px 15px;
    border-radius: 14px 14px 14px 3px;
    max-width: 78%;
    width: fit-content;
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.6;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
.user {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    padding: 12px 15px;
    border-radius: 14px 14px 3px 14px;
    margin-left: auto;
    max-width: 78%;
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.6;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
.typing-dots { display:flex; gap:4px; align-items:center; padding:10px 15px; }
.typing-dots span {
    width:7px; height:7px;
    background: rgba(255,255,255,0.5);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay:0.2s; }
.typing-dots span:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0);} 30%{transform:translateY(-6px);} }
.input-box {
    display: flex;
    padding: 12px;
    background: rgba(8, 6, 7, 0.85);
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
}
textarea {
    flex: 1;
    padding: 11px 14px;
    border: none;
    outline: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    color: white;
    font-family: 'Segoe UI', Arial;
    font-size: 14px;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
}
textarea::placeholder { color: rgba(255,255,255,0.4); }
.send-btn {
    width: 44px; height: 44px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #6366f1, #38bdf8);
    color: white;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
    transition: 0.2s;
}
.send-btn:hover { transform: scale(1.08); }
.send-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
@media(max-width:740px){ .container{width:98vw;height:98vh;border-radius:12px;} }
</style>
</head>
<body>
<div class="container">

    <div class="header">
        <div class="header-left">
            <img src="https://res.cloudinary.com/dfzdsdoa5/image/upload/v1781799602/artificial-intelligence_yqv3ol.png" width="26" height="26">
            <span>AI Practice Mode</span>
            <select class="mode-select" id="modeSelect" onchange="newSession()">
                <option value="technical">🛠️ Technical</option>
                <option value="hr">🤝 HR / Behavioral</option>
                <option value="system">🏗️ System Design</option>
                <option value="dsa">🧮 DSA</option>
            </select>
        </div>
        <div style="display:flex;gap:8px;">
            <button class="back-btn" style="background:rgba(255,255,255,0.1);color:white;" onclick="newSession()">🔄</button>
            <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
        </div>
    </div>

    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>

    <div class="chat" id="chat"></div>

    <div class="input-box">
        <textarea id="input" placeholder="Type your answer... (Enter to send)" rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()">➤</button>
    </div>

</div>

<script>
const BACKEND = "https://ai-interview-simulator-316l.onrender.com";
const TOTAL = 10;
let history = [];
let busy = false;

function addAI(text) {
    removeTyping();
    const div = document.createElement("div");
    div.className = "ai";
    div.textContent = "🤖 " + text;
    document.getElementById("chat").appendChild(div);
    scrollBottom();
    updateProgress();
}

function addUser(text) {
    const div = document.createElement("div");
    div.className = "user";
    div.textContent = "👤 " + text;
    document.getElementById("chat").appendChild(div);
    scrollBottom();
}

function showTyping() {
    removeTyping();
    const div = document.createElement("div");
    div.className = "ai typing-dots";
    div.id = "typingEl";
    div.innerHTML = "<span></span><span></span><span></span>";
    document.getElementById("chat").appendChild(div);
    scrollBottom();
}

function removeTyping() {
    document.getElementById("typingEl")?.remove();
}

function scrollBottom() {
    const c = document.getElementById("chat");
    c.scrollTop = c.scrollHeight;
}

function updateProgress() {
    const aiTurns = history.filter(h => h.role === "assistant").length;
    const pct = Math.min((aiTurns / TOTAL) * 100, 100);
    document.getElementById("progressBar").style.width = pct + "%";
}

async function callChat(message) {
    const mode = document.getElementById("modeSelect").value;
    const res = await fetch(`${BACKEND}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message, history, mode })
    });
    if (!res.ok) throw new Error("Backend error " + res.status);
    const data = await res.json();
    history = data.history || history;
    return data.reply;
}

async function newSession() {
    history = [];
    document.getElementById("chat").innerHTML = "";
    document.getElementById("progressBar").style.width = "0%";
    showTyping();
    try {
        const reply = await callChat("");
        addAI(reply);
    } catch(e) {
        addAI("Could not connect to the server. Please try again.");
    }
}

async function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text || busy) return;

    addUser(text);
    input.value = "";
    input.style.height = "auto";
    busy = true;
    document.getElementById("sendBtn").disabled = true;
    showTyping();

    try {
        const reply = await callChat(text);
        addAI(reply);
    } catch(e) {
        addAI("Could not reach the server. Please try again.");
    } finally {
        busy = false;
        document.getElementById("sendBtn").disabled = false;
    }
}

// Auto resize textarea
document.getElementById("input").addEventListener("input", function() {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 120) + "px";
});

// Enter to send
document.getElementById("input").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

// Start
window.onload = () => newSession();
</script>
</body>
</html>
